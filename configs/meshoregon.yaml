# MeshOregon starter preset.
# The app replaces owner and owner_short with the live node values before diff/upload.
is_unmessagable: {}
config:
  device:
    nodeInfoBroadcastSecs: 43200
  position:
    positionBroadcastSecs: 86400
    positionBroadcastSmartEnabled: true
    gpsUpdateInterval: 120
    positionFlags: 811
    broadcastSmartMinimumDistance: 100
    broadcastSmartMinimumIntervalSecs: 900
  lora:
    bandwidth: 125
    spreadFactor: 8
    codingRate: 5
    region: US
    hopLimit: 7
    txEnabled: true
    sx126xRxBoostedGain: true
    overrideFrequency: 918.5
    usePreset: false

module_config:
channels:
  - settings:
      psk: AQ==
      name: MeshOregon
      moduleSettings:
        positionPrecision: 15
    role: PRIMARY
    index: 0
  - index: 1
    settings:
      psk: BQ==
      name: Local
      moduleSettings: {}
    role: SECONDARY
  - index: 2
    settings: {}
  - index: 3
    settings: {}
  - index: 4
    settings: {}
  - index: 5
    settings: {}
  - index: 6
    settings: {}
  - index: 7
    settings: {}